<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cashew Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <img src="header.png" alt="Header" class="header-img">
    </header>

    <main class="ticket-container">
        <div class="ticket-card">
            
            <div class="video-section">
                <video src="ticket_video.mp4" autoplay loop muted playsinline class="main-video"></video>
            </div>

            <div class="info-section">
                <div class="info-group">
                    <span class="label">Получатель:</span>
                    <p class="value">Оплата проезда в автобусе, гар. номер 36749<br>
                    г. Гомель<br>
                    Филиал "Автобусный парк № 1"</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен с:</span>
                    <p class="value">02.04.2026 16:35</p>
                </div>

                <div class="info-group">
                    <span class="label">Активен до:</span>
                    <p class="value">02.04.2026 17:15</p>
                </div>

                <div class="info-group">
                    <span class="label">Описание:</span>
                    <p class="value description">#ee1d1822de103193#</p>
                </div>

                <div class="info-group">
                    <span class="label">Цена:</span>
                    <p class="value description">1.05 BYN</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Cashew</p>
        <p><a href="mailto:info@cashew.me">info@cashew.me</a></p>
    </footer>

</body>
</html>
